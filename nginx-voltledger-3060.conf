# VOLTLEDGER - Port 3060 (Public Entry)
# Maps to .NET backend on 3030 and frontend preview on 3070

# Maintenance page
server {
    listen 3060;
    server_name 20.81.227.175 localhost 10.0.0.4 _;

    # Health check endpoint - pass through to backend
    location /api/health {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        
        error_page 502 503 504 = @maintenance;
    }
    
    # API endpoints - pass through to backend if available
    location /api/ {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        
        error_page 502 503 504 = @maintenance;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # Try frontend dev server first, fallback to maintenance
    location / {
        proxy_pass http://127.0.0.1:3070;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 2s;
        
        error_page 502 503 504 = @maintenance;
    }
    
    # Maintenance page
    location @maintenance {
        add_header Content-Type text/html;
        return 200 '<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltLedger - Service Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "JetBrains Mono", "SF Mono", monospace;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(10,10,30,0.8) 0%, #050505 50%, #000 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        p {
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.3);
            padding: 12px 24px;
            border-radius: 8px;
            color: #ffc107;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #ffc107;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .info {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
        }
        .info h3 {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .info code {
            display: block;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #00ff88;
            margin: 5px 0;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            color: #00f3ff;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚡</div>
        <h1>VoltLedger</h1>
        <p>E-bike Lending Platform for Kenyan EV Market</p>
        
        <div class="status">
            <span class="status-dot"></span>
            Service Starting Up
        </div>
        
        <p>The VoltLedger backend service is currently initializing.<br>
        Please wait a moment for the system to become available.</p>
        
        <div class="info">
            <h3>Start Services</h3>
            <code>cd ~/volt-ledger-ev/src/backend && dotnet run --urls "http://0.0.0.0:3030"</code>
            <code>cd ~/volt-ledger-ev/src/frontend && npm run dev -- --port 3070</code>
        </div>
        
        <div class="links">
            <a href="http://20.81.227.175:3050">Sherlock Visage</a>
            <a href="http://20.81.227.175:3060/api/health">Health Check</a>
        </div>
    </div>
</body>
</html>';
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

# Direct API access on port 3031 (bypass nginx for API clients)
server {
    listen 3031;
    server_name localhost;
    
    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        error_page 502 503 504 = @maintenance;
    }
    
    location @maintenance {
        return 503 '{"status":"maintenance","message":"VoltLedger backend is starting up"}';
        add_header Content-Type application/json;
    }
}
